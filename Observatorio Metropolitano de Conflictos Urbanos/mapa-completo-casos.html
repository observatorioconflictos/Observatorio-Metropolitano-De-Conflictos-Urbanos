<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Completo por Casos - Observatorio Metropolitano de Conflictos Urbanos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/header-footer.css">
    <link rel="stylesheet" href="css/mapa-completo-casos.css">
    <link rel="stylesheet" href="css/mapa.css"> 
    <link rel="stylesheet" href="css/ficha.css"> 
</head>
 
<body>
    <div id="mapa-completo-casos"></div>

    <footer class="footer-mini">
        <p>2026 - Observatorio Metropolitano de Conflictos Urbanos está licenciado bajo CC BY-NC 4.0</p>
    </footer>

    <div id="modal-ficha" class="modal-overlay">
        <div class="modal-window">
            <div class="ficha-header">
                <div class="top-row">
                    <span id="ficha-estado" class="estado-badge">ESTADO</span>
                    <button class="close-ficha" onclick="cerrarFicha()">×</button>
                </div>
                <h2 id="ficha-titulo">Título del Caso</h2>
                <div class="ficha-date">Actualizado: <span id="ficha-actualizacion">-</span></div>
            </div>
            <div class="red-line-separator"></div>
            <div class="ficha-body">
                <div class="ficha-grid">
                    <div class="col-datos">
                        <div class="section-header-wrapper first-section">
                            <h4 class="section-label-red">UBICACIÓN</h4>
                        </div>
                        <ul class="ficha-list" id="lista-ubicacion"></ul>
                        
                        <div id="wrapper-detalles" style="margin-top: 20px;">
                            <div class="section-header-wrapper">
                                <h4 class="section-label-red">DETALLES DEL CASO</h4>
                            </div>
                            <ul class="ficha-list" id="lista-detalles"></ul>
                        </div>
                    </div>
                    <div class="col-mapa">
                        <div id="mapa-detalle"></div>
                    </div>
                </div>
                <div class="wrapper-descripcion">
                    <div class="section-header-wrapper">
                        <h4 class="section-label-red">DESCRIPCIÓN</h4>
                    </div>
                    <p id="ficha-descripcion" class="text-desc"></p>
                </div>
                <div id="wrapper-imagen" style="display:none; margin-top:25px;">
                    <div class="section-header-wrapper text-center">
                        <h4 class="section-label-red">EVIDENCIA</h4>
                    </div>
                    <div style="text-align: center; margin-top: 15px;">
                        <img id="ficha-imagen" src="" alt="Evidencia" style="max-width:100%; height:auto;">
                    </div>
                </div>
            </div>
        </div>
    </div> 

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="js/general.js"></script>
    <script src="js/header-footer.js"></script>
    <script src="js/ficha.js"></script>
    <script src="js/mapa.js"></script>
</body>
</html>
